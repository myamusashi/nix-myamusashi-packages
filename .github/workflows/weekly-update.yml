name: Weekly Update

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  update-and-build:
    name: Update, Build, and Push to Cachix
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            accept-flake-config = true
            extra-substituters = https://myamusashi.cachix.org https://cache.nixos.org https://nix-community.cachix.org https://chaotic-nyx.cachix.org https://ezkea.cachix.org https://hyprland.cachix.org https://walker.cachix.org https://walker-git.cachix.org https://cache.flox.dev https://cache.xinux.uz https://attic.xuyh0120.win/lantian
            extra-trusted-public-keys = myamusashi.cachix.org-1:ra4PbY6yqM1pSvkGqJ78CZse3WWgjk4rOXBMtjD9YrY= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= chaotic-nyx.cachix.org-1:HfnXSw4pj95iI/n17rIDy40agHj12WfF+Gqk6SonIT8= ezkea.cachix.org-1:ioBmUbJTZIKsHmWWXPe1FSFbeVe+afhfgqgTSNd34eI= flox-cache-public-1:7F4OyH7ZCnFhcze3fJdfyXYLQw/aV7GEed86nQ7IsOs= hyprland.cachix.org-1:a7pgxzMz7+chwVL3/pzj6jIBMioiJM7ypFP8PwtkuGc= walker.cachix.org-1:fG8q+uAaMqhsMxWjwvk0IMb4mFPFLqHjuvfwQxE4oJM= walker-git.cachix.org-1:vmC0ocfPWh0S/vRAQGtChuiZBTAe4wiKDeyyXM0/7pM= cache.xinux.uz:BXCrtqejFjWzWEB9YuGB7X2MV4ttBur1N8BkwQRdH+0= lantian:EeAUQ+W+6r7EtwnmYjeVwx5kOGEBpjlBfPlzGlTNvHc=

      - name: Setup Cachix
        uses: cachix/cachix-action@v16
        with:
          name: myamusashi
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Update flake inputs
        run: nix flake update

      - name: Install nushell
        run: nix profile install nixpkgs#nushell

      - name: Update local packages
        run: |
          if [ -f ./update-packages.nu ]; then
            nu ./update-packages.nu
          fi

      - name: Build all packages
        env:
          NIXPKGS_ALLOW_UNFREE: 1
        run: |
          nix eval --json .#packages.x86_64-linux --apply 'x: builtins.attrNames x' \
            | jq -r '.[]' \
            | grep -vFx -f <(printf '%s\n' "default-rules" "plasma-workspace" "libplasma" "login-session") \
            | xargs -I {} nix build ".#{}" --no-link --print-out-paths

      - name: Commit updates
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add flake.lock packages/
          git diff --staged --quiet || git commit -m "chore: weekly flake update"
          git push
