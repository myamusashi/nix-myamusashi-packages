name: Weekly Update

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  update-and-build:
    name: Update, Build, and Push to Cachix
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Cachix
        uses: cachix/cachix-action@v16
        with:
          name: myamusashi
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Update flake inputs
        run: nix flake update

      - name: Install nushell
        run: nix profile install nixpkgs#nushell

      - name: Update local packages
        run: |
          if [ -f ./update-packages.nu ]; then
            nu ./update-packages.nu
          fi

      - name: Build all packages
        run: |
          nix eval --json .#packages.x86_64-linux --apply 'x: builtins.attrNames x' \
            | jq -r '.[]' \
            | xargs -I {} nix build ".#{}" --no-link --print-out-paths

      - name: Commit updates
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add flake.lock packages/
          git diff --staged --quiet || git commit -m "chore: weekly flake update"
          git push
