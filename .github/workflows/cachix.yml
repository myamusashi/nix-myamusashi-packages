name: Cachix

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build-and-push:
    name: Build and Push to Cachix
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Cachix
        uses: cachix/cachix-action@v16
        with:
          name: myamusashi
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build all packages
        run: |
          nix eval --json .#packages.x86_64-linux --apply 'x: builtins.attrNames x' \
            | jq -r '.[]' \
            | xargs -I {} nix build ".#{}" --no-link --print-out-paths
